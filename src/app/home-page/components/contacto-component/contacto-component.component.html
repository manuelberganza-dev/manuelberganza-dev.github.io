<section class="my-24">

  <h3 class="text-2xl md:text-3xl text-center font-bold mb-10">Contáctame</h3>

  <div class="flex flex-col items-center md:flex-row md:items-center md:justify-center gap-6 text-xl">
    <p class="bg-slate-900 p-4 rounded">{{ emailContacto }}</p>
    <button
      (click)="copiarTexto()"
      class="bg-celeste-oscuro w-28 p-2 rounded md:p-4 hover:bg-blue-950 transition ease-in-out duration-150">
      Copiar
    </button>

    @if (copiado) {
      <span class="bg-celeste-oscuro text-center p-2 rounded-lg">
        ¡Gracias por contactarme!, responderé a la mayor brevedad posible.
      </span>
    }
  </div>

</section>
