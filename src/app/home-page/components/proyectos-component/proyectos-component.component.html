<section class="px-4 my-16 md:max-w-3xl md:mx-auto xl:max-w-6xl">
  <h2 class="text-2xl md:text-3xl font-bold mb-10 text-center">Algunos de mis proyectos.</h2>

  <!-- GRID -->
  <div class="grid grid-cols-1 gap-12 md:grid-cols-2 xl:grid-cols-3">

    @for (card of cards; track $index) {
      <!-- card -->
      <div class="flex flex-col justify-between">

        <!-- imagen -->
        <div class="rounded-lg overflow-hidden mb-3">
          <img src="/assets/images/placeholder.png" alt="">
        </div>

        <div>
          <!-- descripcion -->
          <div class="mb-4">
            <h3 class="text-xl font-bold mb-2"> {{ card.titulo }} </h3>
            <p class="text-gray-400"> {{ card.descripcion }} </p>
          </div>

          <!-- badges -->
          <div class="flex justify-start gap-4">

            @for (lenguaje of card.tecnologias; track $index) {
              <div class="bg-gray-800 p-1 md:p-2 rounded text-sm">
                <p class="text-gray-400"> {{ lenguaje }} </p>
              </div>
            }

          </div>

        </div>
      </div>
    }

  </div>
</section>
